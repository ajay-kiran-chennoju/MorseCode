<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MorseCode | Minimalist Tool</title>
    <meta name="description" content="A minimal, offline-ready Morse code input and translation tool.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Top Section -->
        <header class="top-section">
            <div class="text-display-wrapper">
                <textarea id="output" readonly placeholder="Morse input will appear here..."></textarea>
                <div class="action-bar">
                    <button id="copy-btn" title="Copy to Clipboard" aria-label="Copy to Clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                    </button>
                    <button id="translate-btn" title="Hold to Translate" aria-label="Hold to Translate">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16"></path>
                        </svg>
                    </button>
                    <button id="clear-btn" title="Clear All" aria-label="Clear All">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Center Section -->
        <main class="center-section">
            <button id="morse-pad" class="morse-button" aria-label="Morse Pad">
                <div class="inner-circle"></div>
            </button>
        </main>

        <!-- Bottom Section -->
        <footer class="bottom-section">
            <div class="legend">
                <div class="legend-item">short press button = dot</div>
                <div class="legend-item">long press button = dash</div>
                <div class="legend-item">short pause = space between letters</div>
                <div class="legend-item">long pause = space between words</div>
            </div>

            <div class="action-stack">
                <button id="decode-modal-btn" class="help-toggle" title="Decode Morse Paste"
                    aria-label="Open Morse Decoder">
                    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 14v3m4-6V7a3 3 0 1 1 6 0v4M5 11h10a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1Z" />
                    </svg>
                </button>
                <button id="help-btn" class="help-toggle" aria-label="Open Help">
                    <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 11h2v5m-2 0h4m-2.592-8.5h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Help Modal -->
    <div id="help-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-help">&times;</span>
            <h2 class="modal-header">Morse Alphabet</h2>
            <div class="morse-grid" id="alphabet-grid">
                <!-- JavaScript will populate this -->
            </div>
        </div>
    </div>

    <!-- Decode Modal -->
    <div id="decode-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="close-decode">&times;</span>
            <h2 class="modal-header">Morse Decoder</h2>
            <textarea id="decode-input" placeholder="Paste Morse code here..."></textarea>
            <div id="decode-result" class="result-display"></div>
            <div id="trojan-container" class="trojan-box hidden">
                <svg viewBox="0 0 100 100" class="trojan-horse-svg">
                    <path d="M20 80h60l-5-40h-10l-5-15h-15l-5 15h-10l-10 40M45 25v-10h10v10M30 80l-5 10M70 80l5 10"
                        fill="none" stroke="currentColor" stroke-width="2" />
                    <circle cx="45" cy="40" r="2" fill="currentColor" />
                </svg>
                <p>Invalid Morse Sequence</p>
            </div>
            <button id="run-decode" class="decode-action-btn">Convert to English</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
